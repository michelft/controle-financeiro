<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css');
:root{
  --bg0:#08090a;--bg1:#0f1011;--bg2:#191a1b;--bg3:#28282c;
  --tx0:#f7f8f8;--tx1:#d0d6e0;--tx2:#8a8f98;--tx3:#62666d;
  --indigo:#5e6ad2;--indigoB:#7170ff;--indigoL:#828fff;
  --bd1:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.08);
  --btn1:rgba(255,255,255,0.02);--btn2:rgba(255,255,255,0.05);
  --success:#4cb782;--warning:#f2994a;--error:#e5484d;--cyan:#56b6c2;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg0);color:var(--tx0);font-family:Inter,system-ui,sans-serif;font-feature-settings:'cv01','ss03';-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;cursor:pointer;}
::placeholder{color:var(--tx3);}
input,select{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}
select option{background:var(--bg2);color:var(--tx0);}
.num{font-variant-numeric:tabular-nums;white-space:nowrap;}
.app{display:flex;min-height:100vh;min-height:100dvh;}
.card{background:var(--bg1);border:1px solid var(--bd1);border-radius:12px;}
main{flex:1;min-width:0;width:100%;max-width:1180px;margin:0 auto;padding:32px;}
h1{font-size:22px;font-weight:590;letter-spacing:-.4px;}
.sub{font-size:13px;color:var(--tx2);margin-top:3px;}
.btn{border-radius:8px;padding:10px 16px;font-size:14px;font-weight:510;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--indigoB);background:var(--indigo);color:var(--tx0);}
.btn.sec{background:var(--btn2);border:1px solid var(--bd2);color:var(--tx1);}
.iconbtn{background:var(--btn1);border:1px solid var(--bd1);border-radius:8px;color:var(--tx2);width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ghost{background:none;border:none;color:var(--tx2);font-size:13px;padding:2px 6px;}
svg{display:block;}
.sidebar{width:240px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bd1);padding:20px 16px;display:flex;flex-direction:column;position:sticky;top:0;align-self:flex-start;min-height:100vh;min-height:100dvh;}
.sidebar.collapsed{width:72px;padding:20px 12px;align-items:center;}
.sidebar-toggle{display:flex;align-items:center;gap:10px;margin-bottom:24px;min-height:32px;background:none;border:none;padding:0;width:100%;}
.sidebar.collapsed .sidebar-toggle{justify-content:center;}
.sidebar.collapsed .navbtn{justify-content:center;padding:10px;width:auto;}
.navbtn{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:8px;font-size:14px;font-weight:510;background:transparent;border:1px solid transparent;color:var(--tx2);width:100%;text-align:left;}
.navbtn.on{background:var(--btn2);border:1px solid var(--bd2);color:var(--tx0);}
.bottomnav{display:none;}
@media(max-width:759px){
  .sidebar{display:none;}
  main{padding:20px 16px calc(80px + env(safe-area-inset-bottom));}
  .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg1);border-top:1px solid var(--bd2);z-index:40;}
  .bnbtn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--tx2);font-size:11px;font-weight:510;}
  .bnbtn.on{color:var(--indigoL);}
}
.grid-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(200px,100%),1fr));gap:12px;}
.grid-charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:14px;}
.list-group{margin-bottom:28px;}
.list-group-label{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:590;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;padding:0 2px;}
.list-group-label::after{content:'';flex:1;height:1px;background:var(--bd1);}
.lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg1);border:1px solid var(--bd1);border-radius:12px;margin-bottom:8px;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;}
.lrow:last-child{margin-bottom:0;}
.lrow.dragging{opacity:.3;border:1.5px dashed var(--indigo);}
.lrow.drag-over{border-color:var(--indigo);background:rgba(94,106,210,.07);}
.lrow-main{flex:1;min-width:0;}
.lrow-name{font-size:15px;font-weight:510;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx0);}
.lrow-meta{display:flex;align-items:center;gap:6px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lrow-meta span{flex-shrink:0;}
.lrow-val{font-size:16px;font-weight:590;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;}
.lrow-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.lrow:hover .lrow-actions,.lrow:focus-within .lrow-actions{opacity:1;}
.drag-handle{color:var(--tx3);cursor:grab;flex-shrink:0;display:flex;align-items:center;}
@media(max-width:759px){
  .lrow{gap:10px;padding:11px 12px;flex-wrap:wrap;}
  .drag-handle{order:1;}
  .lrow .chk{order:1;}
  .lrow-main{flex:1 1 auto;order:2;min-width:0;}
  .lrow-val{order:3;margin-left:auto;}
  .lrow-actions{order:4;opacity:1;flex-basis:100%;justify-content:flex-end;border-top:1px solid var(--bd1);margin-top:8px;padding-top:8px;}
  .lrow-meta{font-size:11px;}
}
.row{display:flex;align-items:center;}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd2);background:transparent;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.chk.on{background:var(--success);border-color:var(--success);}
.badge{font-size:11px;font-weight:510;border-radius:9999px;padding:3px 9px;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.sheet{background:var(--bg1);border:1px solid var(--bd2);width:100%;max-width:520px;padding:24px;border-radius:16px 16px 0 0;}
@media(min-width:760px){.overlay{align-items:center;}.sheet{border-radius:16px;}}
.input{background:var(--bg1);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;color:var(--tx0);font-size:15px;outline:none;width:100%;}
.input:focus{border-color:var(--indigo);}
.field{display:flex;flex-direction:column;gap:6px;flex:1;}
.field span{font-size:12px;color:var(--tx2);font-weight:510;}
.clip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seg{display:flex;gap:10px;margin-bottom:16px;}
.segbtn{flex:1;padding:10px 0;border-radius:8px;font-size:14px;font-weight:510;background:var(--btn1);border:1px solid var(--bd1);color:var(--tx2);}
.segbtn.on{background:var(--btn2);border:1px solid var(--bd2);color:var(--tx0);}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);}
.dot{width:7px;height:7px;border-radius:9999px;background:var(--tx3);}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:15px;letter-spacing:.5px;color:var(--tx0);background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:12px 14px;word-break:break-all;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════ CONFIG SUPABASE ════════
const SB_URL='https://jnpwdvddiygdhooffoxp.supabase.co';
const SB_KEY='sb_publishable_LvAa49Tz2T5TptUP5E7vNQ_HRSb5rNs';

// ── icons ────────────────────────────────────────────────
const I={
  home:'<path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/>',
  out:'<circle cx="12" cy="12" r="9"/><path d="M12 8v8M12 16l-3-3M12 16l3-3"/>',
  in:'<circle cx="12" cy="12" r="9"/><path d="M12 16V8M12 8L9 11M12 8l3 3"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>',
  eyeOff:'<path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3 3.7"/><path d="M6.3 6.3A17 17 0 0 0 2 12s3.5 7 10 7a10.6 10.6 0 0 0 3.4-.6"/>',
  grip:'<path d="M9 5h.01M9 12h.01M9 19h.01M15 5h.01M15 12h.01M15 19h.01"/>',
  up:'<path d="M7 14l5-5 5 5"/>',down:'<path d="M7 10l5 5 5-5"/>',
  cloud:'<path d="M7 18h9a4 4 0 0 0 .5-7.97A6 6 0 0 0 5 9.5 3.5 3.5 0 0 0 6 18z"/><path d="M9.5 13.5l1.8 1.8 3.2-3.3"/>',
};
const ic=(k,sz=18,sw=1.5,col)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${I[k]}</svg>`;

// ── helpers ──────────────────────────────────────────────
const brl=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const today=()=>new Date().toISOString().slice(0,10);
const ddmm=iso=>{if(!iso)return'—';const p=iso.split('-');return p[2]+'/'+p[1];};
const dUntil=iso=>{if(!iso)return null;const a=new Date(today()+'T00:00:00'),b=new Date(iso+'T00:00:00');return Math.round((b-a)/86400000);};
const uid=()=>Math.random().toString(36).slice(2,10);
const MES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const mesAtual=()=>{const d=new Date();return MES[d.getMonth()]+' de '+d.getFullYear();};
const MH='R$ ••••';
function genToken(){const g=()=>Math.random().toString(36).slice(2,6);return 'fin-'+g()+'-'+g()+'-'+g();}
function statusOf(it){
  if(it.tipo==='receita')return it.pago?{l:'recebido',c:'var(--success)'}:{l:'a receber',c:'var(--tx2)'};
  if(it.pago)return{l:'pago',c:'var(--success)'};
  if(!it.vencimento)return{l:'sem data',c:'var(--tx3)'};
  const d=dUntil(it.vencimento);
  if(d<0)return{l:'atrasado',c:'var(--error)'};
  if(d===0)return{l:'vence hoje',c:'var(--warning)'};
  if(d<=7)return{l:'vence em '+d+'d',c:'var(--warning)'};
  return{l:'vence em '+d+'d',c:'var(--tx2)'};
}
function badge(st){return `<span class="badge" style="color:${st.c};border:1px solid color-mix(in srgb,${st.c} 33%,transparent);background:color-mix(in srgb,${st.c} 14%,transparent)">${st.l}</span>`;}

// ── seed + storage ───────────────────────────────────────
const SEED=[
 ['Aluguel',2132.47,'fixo','2026-06-01',false,'pessoal'],['Condomínio',697.07,'variável','2026-06-05',true,'pessoal'],
 ['Energia',146.83,'variável','2026-06-12',false,'pessoal'],['Comunidade',97,'variável','2026-06-14',true,''],
 ['Internet',130,'fixo','2026-06-17',false,'pessoal'],['Credpago',231,'fixo','',false,'pessoal'],
 ['Eleven Labs',57,'variável','2026-07-03',false,''],['Claude',110,'fixo','2026-06-22',false,''],
 ['Gpt',110,'fixo','2026-07-17',false,''],['Capcut',67,'fixo','',false,''],['Remédios',0,'variável','',false,''],
 ['Corte de Cabelo',0,'variável','',false,''],['Geladeira',0,'variável','',false,''],['Tênis',0,'variável','',false,''],
 ['Camiseta',0,'variável','',false,''],['Uber',0,'variável','',false,''],
].map(r=>({id:uid(),tipo:'despesa',descricao:r[0],valor:r[1],custo:r[2],vencimento:r[3],pago:r[4],destino:r[5]}));
const IKEY='financas:items',TKEY='financas:token';
function loadLocal(){try{const r=localStorage.getItem(IKEY);if(r)return JSON.parse(r);}catch(e){}return SEED;}
function saveLocal(){try{localStorage.setItem(IKEY,JSON.stringify(S.items));}catch(e){}}

// ── state ────────────────────────────────────────────────
const S={items:loadLocal(),page:'dash',hide:false,collapsed:false,editing:null,token:null,sync:'idle',sheet:null};
// sync: 'idle'|'syncing'|'ok'|'off'

// ── supabase data layer ──────────────────────────────────
async function rpc(fn,args){
  const r=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(args)});
  if(!r.ok)throw new Error('http '+r.status);
  const txt=await r.text();return txt?JSON.parse(txt):null;
}
const clean=arr=>arr.map(x=>({id:x.id,tipo:x.tipo,descricao:x.descricao||'',valor:+x.valor||0,custo:x.custo||'fixo',vencimento:x.vencimento||'',pago:!!x.pago,destino:x.destino||''}));

async function pull(){
  const rows=await rpc('itens_listar',{p_bucket:S.token});
  return clean(rows||[]);
}
async function push(){
  await rpc('itens_substituir',{p_bucket:S.token,p_itens:S.items});
}
let pushTimer=null;
function pushSoon(){
  setSync('syncing');
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{await push();setSync('ok');}catch(e){setSync('off');}
  },400);
}
function setSync(s){S.sync=s;render();}

async function initSync(adopt){
  setSync('syncing');
  try{
    const remote=await pull();
    if(remote.length>0){S.items=remote;saveLocal();}
    else{await push();}            // código novo/vazio: sobe o que tem local
    setSync('ok');
  }catch(e){setSync('off');}
  render();
}

// ── views ────────────────────────────────────────────────
function donut(fixo,variavel){
  const seg=[['var(--indigo)',fixo],['var(--cyan)',variavel]];const total=fixo+variavel;
  const size=160,stroke=20,r=(size-stroke)/2,c=2*Math.PI*r,cx=size/2;let off=0,arcs='';
  if(total>0)for(const[col,v]of seg){const dash=v/total*c;arcs+=`<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cx})"/>`;off+=dash;}
  const center=S.hide?'•••':brl(total).replace('R$','').trim();
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="${stroke}"/>${arcs}
    <text x="${cx}" y="${cx-2}" text-anchor="middle" fill="var(--tx0)" font-size="15" font-weight="590" font-family="Inter">${center}</text>
    <text x="${cx}" y="${cx+15}" text-anchor="middle" fill="var(--tx2)" font-size="11" font-family="Inter">despesas</text></svg>`;
}
function totals(){
  const d=S.items.filter(x=>x.tipo==='despesa'),r=S.items.filter(x=>x.tipo==='receita');
  const tr=r.reduce((s,x)=>s+(+x.valor||0),0),td=d.reduce((s,x)=>s+(+x.valor||0),0);
  const atr=d.filter(x=>!x.pago&&x.vencimento&&dUntil(x.vencimento)<0);
  const ven=d.filter(x=>!x.pago&&x.vencimento&&dUntil(x.vencimento)>=0&&dUntil(x.vencimento)<=7);
  return{tr,td,saldo:tr-td,aPagar:d.filter(x=>!x.pago).reduce((s,x)=>s+(+x.valor||0),0),
    atrVal:atr.reduce((s,x)=>s+(+x.valor||0),0),atrN:atr.length,
    venVal:ven.reduce((s,x)=>s+(+x.valor||0),0),venN:ven.length};
}
function syncPill(){
  const map={idle:['var(--tx3)','—'],syncing:['var(--indigoL)','sincronizando…'],ok:['var(--success)','sincronizado'],off:['var(--warning)','offline (salvo no aparelho)']};
  const[c,l]=map[S.sync]||map.idle;
  return `<span class="pill"><span class="dot" style="background:${c}"></span>${l}</span>`;
}

function dashboard(){
  const T=totals();
  const fixo=S.items.filter(x=>x.tipo==='despesa'&&x.custo==='fixo').reduce((s,x)=>s+(+x.valor||0),0);
  const variavel=S.items.filter(x=>x.tipo==='despesa'&&x.custo==='variável').reduce((s,x)=>s+(+x.valor||0),0);
  const prox=S.items.filter(x=>x.tipo==='despesa'&&!x.pago&&x.vencimento).sort((a,b)=>a.vencimento.localeCompare(b.vencimento)).slice(0,5);
  const comp=T.tr>0?Math.min(100,Math.round(T.td/T.tr*100)):null;
  const m=v=>S.hide?MH:brl(v);
  const metric=(lbl,val,col,sub)=>`<div class="card" style="padding:16px 18px;min-width:0">
    <div style="color:var(--tx2);font-size:13px;font-weight:510">${lbl}</div>
    <div class="num" style="font-size:22px;font-weight:590;margin-top:8px;letter-spacing:-.4px;color:${col||'var(--tx0)'}">${S.hide?MH:val}</div>
    <div style="font-size:12px;color:var(--tx3);margin-top:4px">${sub}</div></div>`;
  return `
  <div class="row" style="justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <div><h1>resumo</h1><div class="sub">${mesAtual()} · ${syncPill()}</div></div>
    <div style="display:flex;gap:8px">
      <button class="iconbtn" onclick="openSync()" title="sincronizar dispositivos">${ic('cloud',18)}</button>
      <button class="iconbtn" onclick="toggleHide()" title="ocultar valores">${ic(S.hide?'eyeOff':'eye',18)}</button>
      <button class="btn" onclick="openNew()">${ic('plus',16,1.7)} novo</button>
    </div>
  </div>

  <div class="card" style="padding:22px;margin-bottom:14px">
    <div style="font-size:13px;color:var(--tx2);font-weight:510">saldo do mês</div>
    <div class="num" style="font-size:clamp(28px,7vw,40px);font-weight:590;letter-spacing:-1px;margin-top:6px;color:${T.saldo>=0?'var(--success)':'var(--error)'}">${S.hide?MH:brl(T.saldo)}</div>
    <div style="display:flex;gap:20px;margin-top:16px;flex-wrap:wrap">
      <div class="row" style="gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:color-mix(in srgb,var(--success) 12%,transparent);color:var(--success);display:flex;align-items:center;justify-content:center">${ic('up',16,1.6)}</span><div><div style="font-size:11px;color:var(--tx3)">recebido</div><div class="num" style="font-size:15px;font-weight:510;color:var(--tx1)">${m(T.tr)}</div></div></div>
      <div class="row" style="gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:color-mix(in srgb,var(--error) 12%,transparent);color:var(--error);display:flex;align-items:center;justify-content:center">${ic('down',16,1.6)}</span><div><div style="font-size:11px;color:var(--tx3)">despesas</div><div class="num" style="font-size:15px;font-weight:510;color:var(--tx1)">${m(T.td)}</div></div></div>
    </div>
    ${comp!==null?`<div style="margin-top:18px"><div class="row" style="justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:6px"><span>renda comprometida</span><span style="color:${comp>=90?'var(--error)':'var(--tx1)'};font-weight:510">${comp}%</span></div><div style="height:6px;border-radius:9999px;background:var(--bg3);overflow:hidden"><div style="width:${comp}%;height:100%;background:${comp>=90?'var(--error)':'var(--indigo)'}"></div></div></div>`:''}
  </div>

  <div class="grid-metrics" style="margin-bottom:14px">
    ${metric('a pagar',brl(T.aPagar),null,'em aberto')}
    ${metric('atrasado',brl(T.atrVal),T.atrN?'var(--error)':null,T.atrN+' conta(s)')}
    ${metric('vence em 7 dias',brl(T.venVal),T.venN?'var(--warning)':null,T.venN+' conta(s)')}
  </div>

  <div class="grid-charts">
    <div class="card" style="padding:20px;min-width:0">
      <div style="font-size:15px;font-weight:590;margin-bottom:16px">para onde vai</div>
      <div class="row" style="gap:18px;flex-wrap:wrap;justify-content:center">${donut(fixo,variavel)}
        <div style="display:flex;flex-direction:column;gap:14px;flex:1;min-width:130px">
          ${[['fixo',fixo,'var(--indigo)'],['variável',variavel,'var(--cyan)']].map(x=>`<div style="min-width:0"><div class="row" style="gap:8px;font-size:13px;color:var(--tx2)"><span style="width:8px;height:8px;border-radius:2px;background:${x[2]};flex-shrink:0"></span>${x[0]}</div><div class="num" style="font-size:18px;font-weight:590;margin-top:2px;letter-spacing:-.24px">${m(x[1])}</div></div>`).join('')}
        </div></div>
    </div>
    <div class="card" style="padding:20px;min-width:0">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px"><span style="font-size:15px;font-weight:590">próximos vencimentos</span><div class="row" style="gap:4px"><button class="ghost" onclick="toggleHide()" title="${S.hide?'mostrar valores':'ocultar valores'}" style="padding:4px;display:flex;align-items:center;color:var(--tx2)">${ic(S.hide?'eyeOff':'eye',16)}</button><button class="ghost" style="color:var(--indigoL);font-weight:510" onclick="go('despesa')">ver todas</button></div></div>
      ${prox.length===0?`<div style="color:var(--tx3);font-size:14px;padding:20px 0">nada a vencer por enquanto.</div>`:prox.map(it=>{const st=statusOf(it);return `<div class="row" style="justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd1);gap:10px"><div style="min-width:0"><div class="clip" style="font-size:14px;font-weight:510">${esc(it.descricao)}</div><div style="font-size:12px;color:var(--tx3)">vence ${ddmm(it.vencimento)}</div></div><div class="row" style="gap:10px;flex-shrink:0"><span class="num" style="font-size:14px;color:var(--tx1)">${S.hide?'R$ ••••':brl(it.valor)}</span>${badge(st)}</div></div>`;}).join('')}
    </div>
  </div>`;
}

function listView(tipo){
  const all=S.items.filter(x=>x.tipo===tipo);
  const total=all.reduce((s,x)=>s+(+x.valor||0),0);
  const titulo=tipo==='despesa'?'despesas':'receitas';
  const head=`<div class="row" style="justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div><h1>${titulo}</h1><div class="sub">${all.length} lançamento(s) · total ${brl(total)}</div></div>
    <button class="btn" onclick="openNew('${tipo}')">${ic('plus',15,1.7)} adicionar</button></div>`;
  if(all.length===0)return head+`<div class="card" style="padding:48px 24px;text-align:center"><div style="color:var(--tx2);font-size:14px">nenhuma ${tipo} ainda.</div><div style="margin-top:14px"><button class="btn" onclick="openNew('${tipo}')">${ic('plus',15,1.7)} criar a primeira</button></div></div>`;

  // group by status priority
  const groups = tipo==='despesa'
    ? [
        {key:'atrasado', label:'atrasado', col:'var(--error)',   filter:x=>!x.pago&&x.vencimento&&dUntil(x.vencimento)<0},
        {key:'hoje',     label:'vence hoje',col:'var(--warning)',filter:x=>!x.pago&&x.vencimento&&dUntil(x.vencimento)===0},
        {key:'semana',   label:'próximos 7 dias',col:'var(--warning)',filter:x=>!x.pago&&x.vencimento&&dUntil(x.vencimento)>0&&dUntil(x.vencimento)<=7},
        {key:'futuro',   label:'a pagar',   col:'var(--tx2)',   filter:x=>!x.pago&&(!x.vencimento||dUntil(x.vencimento)>7)},
        {key:'pago',     label:'pagos',     col:'var(--success)',filter:x=>!!x.pago},
      ]
    : [
        {key:'receber',  label:'a receber', col:'var(--tx2)',   filter:x=>!x.pago},
        {key:'recebido', label:'recebidos', col:'var(--success)',filter:x=>!!x.pago},
      ];

  const rowHTML=(it)=>{
    const st=statusOf(it),rec=it.tipo==='receita';
    return `<div class="lrow" draggable="true" data-id="${it.id}"
      ondragstart="dragStart(event,'${it.id}')"
      ondragover="dragOver(event)"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,'${it.id}')"
      ondragend="dragEnd(event)"
      ontouchstart="touchStart(event,'${it.id}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event,'${it.id}')">
      <span class="drag-handle">${ic('grip',16,1.5)}</span>
      <button class="chk ${it.pago?'on':''}" onclick="togglePago('${it.id}')" style="flex-shrink:0">${it.pago?'<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2l2.2 2.2L9.5 3.5" stroke="#08090a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</button>
      <div class="lrow-main">
        <div class="lrow-name">${esc(it.descricao)||'sem nome'}</div>
        <div class="lrow-meta">
          <span style="font-size:12px;font-weight:510;color:${st.c}">${st.l}</span>
          ${it.vencimento?`<span style="font-size:12px;color:var(--tx3)">· ${ddmm(it.vencimento)}</span>`:''}
          ${!rec&&it.custo?`<span style="font-size:12px;color:var(--tx3)">· ${it.custo}</span>`:''}
          ${it.destino?`<span style="font-size:12px;color:var(--tx3)">· ${esc(it.destino)}</span>`:''}
        </div>
      </div>
      <div class="lrow-val" style="color:${rec?'var(--success)':it.valor>0?'var(--tx0)':'var(--tx3)'}">${rec?'+':''}${brl(it.valor)}</div>
      <div class="lrow-actions">
        <button class="ghost" style="font-size:12px;padding:4px 8px" onclick="openEdit('${it.id}')">editar</button>
        <button class="ghost" style="font-size:12px;padding:4px 8px;color:var(--error)" onclick="del('${it.id}')">excluir</button>
      </div>
    </div>`;
  };

  let html='';
  for(const g of groups){
    const items=all.filter(g.filter);
    if(items.length===0)continue;
    const dot=`<span style="width:7px;height:7px;border-radius:9999px;background:${g.col};flex-shrink:0"></span>`;
    html+=`<div class="list-group" data-group="${g.key}">
      <div class="list-group-label">${dot} ${g.label} <span style="color:var(--tx3);font-weight:400;letter-spacing:0;text-transform:none;font-size:11px">${items.length}</span></div>
      <div class="list-rows" data-group="${g.key}">${items.map(rowHTML).join('')}</div>
    </div>`;
  }
  return head+html;
}

function modalLancamento(){
  const f=S.editing,novo=!f.descricao;
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <div style="width:36px;height:4px;border-radius:9999px;background:var(--bd2);margin:0 auto 18px"></div>
    <h2 style="font-size:18px;font-weight:590;margin-bottom:18px;letter-spacing:-.24px">${novo?'novo lançamento':'editar lançamento'}</h2>
    <div class="seg"><button class="segbtn ${f.tipo==='despesa'?'on':''}" onclick="setField('tipo','despesa')">despesa</button><button class="segbtn ${f.tipo==='receita'?'on':''}" onclick="setField('tipo','receita')">receita</button></div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <label class="field"><span>descrição</span><input class="input" id="f-desc" value="${esc(f.descricao)}" placeholder="ex: aluguel, salário…"></label>
      <div style="display:flex;gap:12px"><label class="field"><span>valor (R$)</span><input class="input" id="f-valor" type="number" step="0.01" inputmode="decimal" value="${f.valor}"></label>${f.tipo==='despesa'?`<label class="field"><span>custo</span><select class="input" id="f-custo"><option value="fixo" ${f.custo==='fixo'?'selected':''}>fixo</option><option value="variável" ${f.custo==='variável'?'selected':''}>variável</option></select></label>`:''}</div>
      <div style="display:flex;gap:12px"><label class="field"><span>vencimento</span><input class="input" id="f-venc" type="date" value="${f.vencimento}"></label><label class="field"><span>cartão / destino</span><input class="input" id="f-dest" value="${esc(f.destino)}" placeholder="opcional"></label></div>
      <label class="row" style="gap:10px;margin-top:2px"><input type="checkbox" id="f-pago" ${f.pago?'checked':''} style="width:16px;height:16px;accent-color:var(--indigo)"><span style="font-size:14px;color:var(--tx1)">${f.tipo==='receita'?'já recebido':'já pago'}</span></label>
    </div>
    <div style="display:flex;gap:8px;margin-top:22px"><button class="btn sec" style="flex:1" onclick="closeModal()">cancelar</button><button class="btn" style="flex:1" onclick="saveItem()">salvar</button></div>
  </div></div>`;
}

function modalSync(){
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">
    <div style="width:36px;height:4px;border-radius:9999px;background:var(--bd2);margin:0 auto 18px"></div>
    <h2 style="font-size:18px;font-weight:590;margin-bottom:6px;letter-spacing:-.24px">sincronizar dispositivos</h2>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:18px">use o mesmo código no celular e no PC para ver os mesmos dados. ${syncPill()}</p>
    <div style="font-size:12px;color:var(--tx2);font-weight:510;margin-bottom:6px">seu código de sincronização</div>
    <div class="code" id="mycode">${esc(S.token)}</div>
    <button class="btn sec" style="width:100%;margin-top:10px" onclick="copyCode()">copiar código</button>
    <div style="height:1px;background:var(--bd1);margin:20px 0"></div>
    <div style="font-size:12px;color:var(--tx2);font-weight:510;margin-bottom:6px">entrar com um código de outro aparelho</div>
    <input class="input" id="joincode" placeholder="cole aqui: fin-xxxx-xxxx-xxxx">
    <p style="font-size:12px;color:var(--tx3);margin-top:8px">isto substitui os dados deste aparelho pelos do código informado.</p>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn sec" style="flex:1" onclick="closeModal()">fechar</button><button class="btn" style="flex:1" onclick="joinCode()">conectar</button></div>
  </div></div>`;
}

function nav(active){
  const items=[['dash','início','home'],['despesa','despesas','out'],['receita','receitas','in']];
  const T=totals();
  const col=S.collapsed;
  const side=`<aside class="sidebar ${col?'collapsed':''}">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="${col?'expandir':'recolher'}">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('wallet',18)}</div>
      ${col?'':`<span style="font-size:15px;font-weight:590;letter-spacing:-.24px;white-space:nowrap">minhas finanças</span>`}
    </button>
    <nav style="display:flex;flex-direction:column;gap:2px">${items.map(x=>`<button class="navbtn ${active===x[0]?'on':''}" onclick="go('${x[0]}')" title="${x[1]}">${ic(x[2],18)} ${col?'':x[1]}</button>`).join('')}</nav>
    <button class="navbtn" style="margin-top:8px" onclick="openSync()" title="sincronizar">${ic('cloud',18)} ${col?'':'sincronizar'}</button>
    ${col?'':`<div class="card" style="margin-top:auto;padding:14px 16px"><div style="font-size:12px;color:var(--tx2)">saldo atual</div><div class="num" style="font-size:18px;font-weight:590;margin-top:2px;color:${T.saldo>=0?'var(--success)':'var(--error)'}">${S.hide?MH:brl(T.saldo)}</div></div>`}</aside>`;
  const bottom=`<nav class="bottomnav">${items.map(x=>`<button class="bnbtn ${active===x[0]?'on':''}" onclick="go('${x[0]}')">${ic(x[2],21)} ${x[1]}</button>`).join('')}</nav>`;
  return{side,bottom};
}

// ── drag & drop (mouse + touch) ──────────────────────────
let dragId=null,dragEl=null,touchY=0,touchClone=null;

function dragStart(e,id){
  dragId=id; dragEl=e.currentTarget;
  dragEl.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  const row=e.currentTarget;
  if(row.dataset.id!==dragId) row.classList.add('drag-over');
}
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e){ document.querySelectorAll('.lrow').forEach(r=>{r.classList.remove('dragging','drag-over');}); dragId=null; dragEl=null; }
function dragDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragId||dragId===targetId)return;
  const from=S.items.findIndex(x=>x.id===dragId);
  const to=S.items.findIndex(x=>x.id===targetId);
  if(from<0||to<0)return;
  const moved=S.items.splice(from,1)[0];
  S.items.splice(to,0,moved);
  saveLocal(); pushSoon(); render();
}

// touch drag (mobile)
function touchStart(e,id){
  if(e.touches.length>1)return;
  dragId=id; touchY=e.touches[0].clientY;
  const src=e.currentTarget;
  touchClone=src.cloneNode(true);
  const r=src.getBoundingClientRect();
  touchClone.style.cssText=`position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;opacity:.85;pointer-events:none;z-index:999;border:1.5px solid var(--indigo);box-shadow:0 8px 32px rgba(0,0,0,.4);border-radius:12px;`;
  document.body.appendChild(touchClone);
  src.classList.add('dragging');
}
function touchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const dy=e.touches[0].clientY-touchY;
  const t=parseFloat(touchClone.style.top)+dy;
  touchClone.style.top=t+'px'; touchY=e.touches[0].clientY;
  document.querySelectorAll('.lrow').forEach(r=>r.classList.remove('drag-over'));
  const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  const row=el&&el.closest('.lrow');
  if(row&&row.dataset.id&&row.dataset.id!==dragId) row.classList.add('drag-over');
}
function touchEnd(e,id){
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.lrow').forEach(r=>r.classList.remove('dragging','drag-over'));
  const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  const row=el&&el.closest('.lrow');
  const targetId=row&&row.dataset.id;
  if(targetId&&targetId!==dragId){
    const from=S.items.findIndex(x=>x.id===dragId);
    const to=S.items.findIndex(x=>x.id===targetId);
    if(from>=0&&to>=0){const m=S.items.splice(from,1)[0];S.items.splice(to,0,m);saveLocal();pushSoon();}
  }
  dragId=null; render();
}

// ── render ───────────────────────────────────────────────
function render(){
  const{side,bottom}=nav(S.page);
  const body=S.page==='dash'?dashboard():listView(S.page);
  let modal='';
  if(S.sheet==='lanc')modal=modalLancamento();
  else if(S.sheet==='sync')modal=modalSync();
  document.getElementById('app').innerHTML=`<div class="app">${side}<main>${body}</main>${bottom}</div>${modal}`;
}

// ── actions ──────────────────────────────────────────────
function go(p){S.page=p;render();window.scrollTo(0,0);}
function toggleHide(){S.hide=!S.hide;render();}
function toggleSidebar(){S.collapsed=!S.collapsed;render();}
function openNew(tipo){S.editing={id:uid(),tipo:tipo||'despesa',descricao:'',valor:0,custo:'fixo',vencimento:'',pago:false,destino:''};S.sheet='lanc';render();}
function openEdit(id){const it=S.items.find(x=>x.id===id);if(it){S.editing=Object.assign({},it);S.sheet='lanc';render();}}
function openSync(){S.sheet='sync';render();}
function closeModal(){S.sheet=null;S.editing=null;render();}
function setField(k,v){S.editing[k]=v;render();}
function togglePago(id){const it=S.items.find(x=>x.id===id);if(it){it.pago=!it.pago;saveLocal();pushSoon();render();}}
function del(id){S.items=S.items.filter(x=>x.id!==id);saveLocal();pushSoon();render();}
function saveItem(){
  const f=S.editing;
  f.descricao=document.getElementById('f-desc').value.trim();
  f.valor=parseFloat(document.getElementById('f-valor').value)||0;
  const cu=document.getElementById('f-custo');if(cu)f.custo=cu.value;
  f.vencimento=document.getElementById('f-venc').value;
  f.destino=document.getElementById('f-dest').value;
  f.pago=document.getElementById('f-pago').checked;
  if(!f.descricao){document.getElementById('f-desc').focus();return;}
  const i=S.items.findIndex(x=>x.id===f.id);
  if(i>=0)S.items[i]=f;else S.items.push(f);
  S.sheet=null;S.editing=null;saveLocal();pushSoon();render();
}
function copyCode(){
  const txt=S.token;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>{const b=event.target;b.textContent='copiado!';setTimeout(()=>b.textContent='copiar código',1500);});}
  else{const el=document.getElementById('mycode');const r=document.createRange();r.selectNode(el);getSelection().removeAllRanges();getSelection().addRange(r);try{document.execCommand('copy');}catch(e){}getSelection().removeAllRanges();}
}
async function joinCode(){
  const v=document.getElementById('joincode').value.trim();
  if(!v){return;}
  S.token=v;localStorage.setItem(TKEY,v);
  S.sheet=null;render();
  await initSync(true);
}

// ── boot ─────────────────────────────────────────────────
(function boot(){
  S.token=localStorage.getItem(TKEY);
  if(!S.token){S.token=genToken();localStorage.setItem(TKEY,S.token);}
  render();          // mostra dados locais já
  initSync();        // depois sincroniza com a nuvem
})();
</script>
</body>
</html>
